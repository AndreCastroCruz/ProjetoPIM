<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Meus Ingressos</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="header-interno">
      <div class="logo-area">
        <span class="logo-text">⚽ TicketFut</span>
      </div>

      <nav>
        <a href="../index.html">Início</a>
        <a href="jogos.html">Jogos</a>
        <a href="carrinho.html">Carrinho</a>
        <a href="#" id="logout">Sair</a>
      </nav>
    </header>

    <section class="banner">
      <img src="../images/estadio.jpg" class="bg" />

      <div class="overlay">
        <h2>Meus Ingressos</h2>

        <div id="ingressos-container"></div>
      </div>
    </section>

    <div id="popup-ingresso" class="popup" style="display: none">
      <div class="popup-content">
        <h2>Seu QRCode de acesso</h2>

        <img id="qrcode-img" src="" />

        <button onclick="fecharPopup()">Fechar</button>
      </div>
    </div>

    <div id="tela-ingressos">
      <div class="conteudo">
        <h2>Seus ingressos disponíveis</h2>

        <div id="lista-qrcodes"></div>

        <button onclick="fecharTelaIngressos()">Fechar</button>
      </div>
    </div>

    <script src="../js/meus-ingressos.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/tema.js"></script>

    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
    
  </body>
</html>
