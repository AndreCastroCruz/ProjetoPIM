<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <section class="banner">
      <img src="../images/estadio.jpg" class="bg" />

      <div class="overlay">
        <h1>Login</h1>

        <form class="form-login">
          <input
            type="email"
            id="emailLogin"
            placeholder="Digite seu email"
            required
          />

          <input
            type="password"
            id="senhaLogin"
            placeholder="Digite sua senha"
            required
          />

          <button type="submit" class="login">Entrar</button>
          <p class="link-login">
            Não tem conta?
            <a href="cadastro.html" class="link-acesso">Cadastrar</a>
          </p>
        </form>
      </div>
    </section>

    <script src="../js/script.js"></script>
  </body>
</html>
<p>Não tem conta? <a href="cadastro.html">Cadastrar</a></p>
