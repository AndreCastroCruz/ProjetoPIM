<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Jogos</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="header-interno">
      <div class="logo-area">
        <span class="logo-text">⚽ TicketFut</span>
      </div>

      <nav>
        <a href="../index.html">Início</a>
        <a href="../pages/carrinho.html">Carrinho</a>
        <a href="meus-ingressos.html">Meus Ingressos</a>
        <a href="#" id="logout">Sair</a>
      </nav>
    </header>

    <section class="banner">
      <img src="../images/estadio.jpg" class="bg" />

      <div class="overlay">
        <h2>Próximos Jogos</h2>

        <div class="jogos-container">
          <div class="jogo">
            <h3>Corinthians x Santos</h3>
            <p class="data">20/04</p>
            <p class="hora">16:00</p>
            <p class="preco" data-preco="150">Preço: R$ 150</p>

            <input type="number" min="1" value="1" class="quantidade" />

            <button class="comprar">Comprar</button>
          </div>

          <div class="jogo">
            <h3>São Paulo x Palmeiras</h3>
            <p class="data">21/04</p>
            <p class="hora">18:00</p>
            <p class="preco" data-preco="160">Preço: R$ 160</p>

            <input type="number" min="1" value="1" class="quantidade" />

            <button class="comprar">Comprar</button>
          </div>

          <div class="jogo">
            <h3>Flamengo x Vasco</h3>
            <p class="data">22/04</p>
            <p class="hora">20:00</p>
            <p class="preco" data-preco="130">Preço: R$ 130</p>

            <input type="number" min="1" value="1" class="quantidade" />

            <button class="comprar">Comprar</button>
          </div>
        </div>
      </div>
    </section>

    <script src="../js/script.js"></script>
  </body>
</html>
